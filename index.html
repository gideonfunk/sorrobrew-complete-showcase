<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorro Brew - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #2c3e50;
            color: #ecf0f1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 0;
            background: linear-gradient(135deg, #3498db, #2c3e50);
        }

        .logo {
            font-size: 3em;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2em;
            color: #bdc3c7;
        }

        .nav {
            text-align: center;
            padding: 20px 0;
        }

        .nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border: 2px solid #3498db;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .nav a:hover {
            background: #3498db;
            transform: translateY(-2px);
        }

        .content {
            padding: 40px 0;
            text-align: center;
        }

        .cta {
            display: inline-block;
            padding: 15px 30px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            margin: 20px;
            transition: all 0.3s;
        }

        .cta:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">☕ Sorro Brew</div>
            <div class="tagline">Exceptional Coffee, Extraordinary Experience</div>
        </div>
    </header>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="complete-showcase.html">Full Showcase</a>
    </nav>

    <div class="container content">
        <h1>Welcome to Sorro Brew</h1>
        <p>Discover our premium selection of artisanal coffees crafted with passion and precision.</p>
        <a href="complete-showcase.html" class="cta">View Complete Showcase</a>
        <a href="products.html" class="cta">Shop Now</a>
    </div>
</body>
</html>
