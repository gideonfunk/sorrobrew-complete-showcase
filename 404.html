<script>
// Add some interactivity
document.addEventListener('DOMContentLoaded', function() {
    // Add search functionality
    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.placeholder = 'Search Sorro Brew...';
    searchInput.className = 'w-full mt-8 p-4 border border-[#e6e5b9] rounded-lg font-['Be_Vietnam_Pro'] text-[#271310] placeholder-[#504442]';
    
    const searchForm = document.createElement('form');
    searchForm.appendChild(searchInput);
    searchForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (query) {
            // Redirect to main page with search parameter
            window.location.href = `index.html?search=${encodeURIComponent(query)}`;
        }
    });
    
    document.querySelector('.earth-modern-card').appendChild(searchForm);
});
