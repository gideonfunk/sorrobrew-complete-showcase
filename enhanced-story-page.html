<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Our Story | Sorro Brew Heritage Journey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="components/brand-story.js"></script>
<script src="components/footer-component.js"></script>
<script src="navigation.js"></script>
<script src="enhanced-navigation.js"></script>
<script src="form-validation.js"></script>
<script src="fix-interactive-elements.js"></script>
</head>
<body class="bg-[#fefccf] text-[#1d1d03] font-['Be_Vietnam_Pro']">
<!-- Navigation will be injected by enhanced-navigation.js -->

<!-- Hero Section -->
<section class="relative min-h-screen flex items-center overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-[rgba(39,19,16,0.1)] to-transparent"></div>
    <div class="relative z-10 max-w-screen-2xl mx-auto px-6 py-20">
        <div class="text-center mb-16">
            <span class="inline-block label-md uppercase tracking-[0.2em] text-[#735c00] font-['Manrope'] font-bold mb-6">The Origin Story</span>
            <h1 class="font-['Manrope'] text-5xl md:text-7xl font-extrabold leading-[1.05] tracking-tight text-[#271310] mb-8">
                From Salvadoran Volcanic Soil<br/>
                <span class="text-[#735c00]">To Your Vancouver Morning</span>
            </h1>
            <p class="text-xl text-[#504442] mb-12 max-w-4xl mx-auto leading-relaxed">
                Sorro Brew is more than a drink; it's a revival of ancestral wisdom, distilled into a modern ritual of wellness and clarity.
            </p>
            <div class="flex flex-col sm:flex-row gap-8 items-center justify-center">
                <button onclick="window.scrollToSection('heritage-section')" class="px-10 py-5 bg-[#735c00] text-white font-['Manrope'] font-bold rounded-lg hover:bg-[#e9c349] transition-all transform hover:scale-105 active:scale-95 duration-200">
                    Explore Heritage
                </button>
                <button onclick="window.scrollToSection('farmers-section')" class="px-10 py-5 bg-transparent border-2 border-[#735c00] text-[#735c00] font-['Manrope'] font-bold rounded-lg hover:bg-[#735c00] hover:text-white transition-all">
                    Meet Our Farmers
                </button>
            </div>
        </div>
    </div>
    
    <!-- Floating Elements -->
    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 translate-y-1/2">
        <div class="bg-white/90 backdrop-blur-lg rounded-lg p-4 shadow-2xl">
            <p class="font-['Manrope'] font-bold text-[#271310] italic">"Coffee is common man's gold."</p>
        </div>
    </div>
</section>

<!-- Story Sections -->
<main id="story-content">
    <!-- Content will be injected by BrandStory component -->
</main>

<!-- Footer -->
<footer id="footer-content">
    <!-- Footer will be injected by FooterComponent -->
</footer>

<script>
    // Initialize components when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
        // Render brand story sections
        const brandStory = new BrandStory();
        document.getElementById('story-content').innerHTML = brandStory.render();
        
        // Render footer
        const footer = new FooterComponent();
        document.getElementById('footer-content').innerHTML = footer.render();
        
        // Initialize footer events
        footer.bindEvents();
    });
    
    // Global scroll function
    window.scrollToSection = function(sectionId) {
        const element = document.getElementById(sectionId);
        if (element) {
            element.scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }
    };
</script>

<style>
.earth-modern-card {
    background: #fefccf;
    border-radius: 12px;
    box-shadow: 0 12px 60px rgba(29, 29, 3, 0.06);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.earth-modern-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 80px rgba(29, 29, 3, 0.12);
}
</style>
</body>
</html>
